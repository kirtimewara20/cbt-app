# Render Blueprint — DB is Oregon-only on free tier; API + Web MUST be region: oregon
#
# If you have old cbt-api/cbt-web in Singapore: DELETE them first, then Manual Sync.

databases:
  - name: cbt-db
    plan: free
    databaseName: cbt_platform
    user: cbt_user
    region: oregon

services:
  - type: web
    name: cbt-api
    runtime: node
    plan: free
    region: oregon
    buildCommand: chmod +x scripts/render-build-api.sh && ./scripts/render-build-api.sh
    startCommand: chmod +x scripts/render-start-api.sh && ./scripts/render-start-api.sh
    healthCheckPath: /api/v1/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: NODE_VERSION
        value: 20.18.0
      - key: DATABASE_URL
        fromDatabase:
          name: cbt-db
          property: connectionString
      - key: JWT_ACCESS_SECRET
        generateValue: true
      - key: JWT_REFRESH_SECRET
        generateValue: true
      - key: JWT_ACCESS_EXPIRY
        value: 15m
      - key: JWT_REFRESH_EXPIRY
        value: 7d
      - key: MFA_ISSUER
        value: CBT Platform
      - key: TOTP_WINDOW
        value: 1
      - key: APP_URL
        value: https://cbt-web.onrender.com

  - type: web
    name: cbt-web
    runtime: node
    plan: free
    region: oregon
    buildCommand: chmod +x scripts/render-build-web.sh && ./scripts/render-build-web.sh
    startCommand: pnpm --filter @cbt/web start
    envVars:
      - key: NODE_ENV
        value: production
      - key: NODE_VERSION
        value: 20.18.0
      - key: NEXT_PUBLIC_API_URL
        value: https://cbt-api.onrender.com/api/v1
      - key: NEXT_PUBLIC_WS_URL
        value: wss://cbt-api.onrender.com
