# Render Blueprint — Oregon only (matches free Postgres)
# Web on Render free tier often OOMs during Next.js build — use Vercel for web (see docs/DEPLOY.md)

databases:
  - name: cbt-db
    plan: free
    databaseName: cbt_platform
    user: cbt_user
    region: oregon

services:
  - type: web
    name: cbt-api
    runtime: node
    plan: free
    region: oregon
    buildCommand: >-
      corepack enable &&
      corepack prepare pnpm@9.15.4 --activate &&
      NODE_ENV=development pnpm install --frozen-lockfile --ignore-scripts &&
      pnpm --filter @cbt/shared build &&
      pnpm --filter @cbt/api exec prisma generate &&
      pnpm --filter @cbt/api build
    startCommand: cd apps/api && npx prisma migrate deploy && node dist/src/main.js
    healthCheckPath: /api/v1/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: NODE_VERSION
        value: 20.18.0
      - key: DATABASE_URL
        fromDatabase:
          name: cbt-db
          property: connectionString
      - key: JWT_ACCESS_SECRET
        generateValue: true
      - key: JWT_REFRESH_SECRET
        generateValue: true
      - key: JWT_ACCESS_EXPIRY
        value: 15m
      - key: JWT_REFRESH_EXPIRY
        value: 7d
      - key: MFA_ISSUER
        value: CBT Platform
      - key: TOTP_WINDOW
        value: 1
      - key: APP_URL
        value: https://cbt-web.vercel.app
