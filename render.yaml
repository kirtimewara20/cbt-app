# Render Blueprint — deploy from GitHub (no Docker on your PC)
# Docs: https://render.com/docs/blueprint-spec

databases:
  - name: cbt-db
    plan: free
    databaseName: cbt_platform
    user: cbt_user

services:
  - type: web
    name: cbt-api
    runtime: node
    plan: free
    region: singapore
    buildCommand: corepack enable && corepack prepare pnpm@9.15.4 --activate && pnpm install --frozen-lockfile && pnpm build:api
    startCommand: pnpm start:api
    healthCheckPath: /api/v1/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: cbt-db
          property: connectionString
      - key: JWT_ACCESS_SECRET
        generateValue: true
      - key: JWT_REFRESH_SECRET
        generateValue: true
      - key: JWT_ACCESS_EXPIRY
        value: 15m
      - key: JWT_REFRESH_EXPIRY
        value: 7d
      - key: MFA_ISSUER
        value: CBT Platform
      - key: TOTP_WINDOW
        value: 1
      # Set after first deploy if CORS fails — use your cbt-web URL
      - key: APP_URL
        value: https://cbt-web.onrender.com

  - type: web
    name: cbt-web
    runtime: node
    plan: free
    region: singapore
    buildCommand: corepack enable && corepack prepare pnpm@9.15.4 --activate && pnpm install --frozen-lockfile && pnpm build:web
    startCommand: pnpm start:web
    envVars:
      - key: NODE_ENV
        value: production
      - key: NEXT_PUBLIC_API_URL
        value: https://cbt-api.onrender.com/api/v1
      - key: NEXT_PUBLIC_WS_URL
        value: wss://cbt-api.onrender.com
