name: CI

on:
  pull_request:
    branches: [main, develop]
  push:
    branches: [main, develop]

jobs:
  lint-and-typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install
      - run: pnpm --filter @cbt/shared build
      - run: pnpm --filter @cbt/api prisma:generate
      - run: pnpm --filter @cbt/shared lint
      - run: pnpm --filter @cbt/api exec tsc --noEmit
      - run: pnpm --filter @cbt/web exec tsc --noEmit

  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: cbt_test
        ports: ['5432:5432']
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7
        ports: ['6379:6379']
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install
      - run: pnpm --filter @cbt/shared build
      - run: pnpm --filter @cbt/api prisma:generate
      - run: pnpm --filter @cbt/api test
        env:
          DATABASE_URL: postgresql://test:test@localhost:5432/cbt_test
          JWT_ACCESS_SECRET: test-access-secret-min-32-characters
          JWT_REFRESH_SECRET: test-refresh-secret-min-32-characters

  security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install
      - run: pnpm audit --audit-level=high
        continue-on-error: true

  build:
    needs: [lint-and-typecheck, test]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install
      - run: pnpm build
        env:
          DATABASE_URL: postgresql://test:test@localhost:5432/cbt_test
          JWT_ACCESS_SECRET: build-access-secret-min-32-characters
          JWT_REFRESH_SECRET: build-refresh-secret-min-32-characters
