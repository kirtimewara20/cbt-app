apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: cbt-ingress
  namespace: cbt-production
  annotations:
    kubernetes.io/ingress.class: nginx
    cert-manager.io/cluster-issuer: letsencrypt-prod
    nginx.ingress.kubernetes.io/proxy-body-size: "50m"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "3600"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "3600"
spec:
  tls:
    - hosts:
        - api.cbt-platform.com
        - app.cbt-platform.com
      secretName: cbt-tls
  rules:
    - host: api.cbt-platform.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: cbt-api
                port:
                  number: 4000
    - host: app.cbt-platform.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: cbt-web
                port:
                  number: 3000
