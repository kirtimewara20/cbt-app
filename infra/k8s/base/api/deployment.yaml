apiVersion: apps/v1
kind: Deployment
metadata:
  name: cbt-api
  namespace: cbt-production
  labels:
    app: cbt-api
spec:
  replicas: 3
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 25%
      maxUnavailable: 0
  selector:
    matchLabels:
      app: cbt-api
  template:
    metadata:
      labels:
        app: cbt-api
    spec:
      containers:
        - name: api
          image: <ECR_REGISTRY>/cbt-api:latest
          ports:
            - containerPort: 4000
          resources:
            requests:
              cpu: 500m
              memory: 1Gi
            limits:
              cpu: 2000m
              memory: 2Gi
          livenessProbe:
            httpGet:
              path: /api/v1/health
              port: 4000
            initialDelaySeconds: 30
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /api/v1/health/ready
              port: 4000
            initialDelaySeconds: 5
            periodSeconds: 5
          envFrom:
            - secretRef:
                name: cbt-api-secrets
            - configMapRef:
                name: cbt-api-config
---
apiVersion: v1
kind: Service
metadata:
  name: cbt-api
  namespace: cbt-production
spec:
  selector:
    app: cbt-api
  ports:
    - port: 4000
      targetPort: 4000
  type: ClusterIP
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: cbt-api-hpa
  namespace: cbt-production
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: cbt-api
  minReplicas: 3
  maxReplicas: 100
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
