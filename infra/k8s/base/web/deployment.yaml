apiVersion: apps/v1
kind: Deployment
metadata:
  name: cbt-web
  namespace: cbt-production
  labels:
    app: cbt-web
spec:
  replicas: 2
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 25%
      maxUnavailable: 0
  selector:
    matchLabels:
      app: cbt-web
  template:
    metadata:
      labels:
        app: cbt-web
    spec:
      containers:
        - name: web
          image: <ECR_REGISTRY>/cbt-web:latest
          ports:
            - containerPort: 3000
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              cpu: 1000m
              memory: 1Gi
          livenessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 30
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 5
          env:
            - name: NODE_ENV
              value: production
            - name: PORT
              value: '3000'
---
apiVersion: v1
kind: Service
metadata:
  name: cbt-web
  namespace: cbt-production
spec:
  selector:
    app: cbt-web
  ports:
    - port: 3000
      targetPort: 3000
  type: ClusterIP
